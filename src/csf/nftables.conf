table inet csf_firewall {
    # 1. High Performance Blocklist Sets (O(1) memory lookup)
    set csf_deny_list {
        type ipv4_addr
        flags interval
    }

    set csf_deny_list6 {
        type ipv6_addr
        flags interval
    }

    # 2. Hardware Offload Path (Flowtable)
    # Automatically bypasses host CPU processing for established traffic
    flowtable csf_hw_fastpath {
        hook ingress priority filter
        devices = { eth0, eth1 } # Populated dynamically via CSF ETH_DEVICE variable
        flags offload;           # Toggles hardware ASIC offloading
    }

    # 3. Base Hook Chains Mapped to CSF Standard Structure
    chain input {
        type filter hook input priority filter; policy accept;

        # Drop blocklists immediately before processing heavy rules
        ip saddr @csf_deny_list drop
        ip6 saddr @csf_deny_list6 drop

        # Call the hardware offload bypass for established connections
        ip protocol tcp flow offload @csf_hw_fastpath
    }

    chain forward {
        type filter hook forward priority filter; policy accept;
        ip protocol tcp flow offload @csf_hw_fastpath
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}
